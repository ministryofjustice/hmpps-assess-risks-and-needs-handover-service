---
# Per environment values which override defaults in hmpps-assess-risks-and-needs-handover-service/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: arns-handover-service-dev.hmpps.service.justice.gov.uk
    className: modsec-non-prod
    modsecurity_enabled: true
    modsecurity_audit_enabled: true
    modsecurity_snippet: |
      SecRuleEngine On
      # Team here grants access to the OpenSearch logs to delve into the cause of the blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-assessments,tag:namespace={{ .Release.Namespace }}"
      # Disables request body scanning so free-text form fields (goal titles, step descriptions) do not trigger false positives
      SecRuleUpdateTargetById 920272 "!REQUEST_BODY"
      # CRS 932260 (Unix RCE detection) false-positives on personal name fields in POST /handover
      # Names like "Perf", "Cat", "Ed" overlap with Unix command names and trip the regex at paranoia level 1
      SecRuleUpdateTargetById 932260 "!ARGS:json.subjectDetails.givenName"
      SecRuleUpdateTargetById 932260 "!ARGS:json.subjectDetails.familyName"
      SecRuleUpdateTargetById 932260 "!ARGS:json.subjectDetails.middleName"
      SecRuleUpdateTargetById 932260 "!ARGS:json.subjectDetails.preferredName"
      SecRuleUpdateTargetById 932260 "!ARGS:json.user.displayName"
      # No PHP in this service - disable PHP rules to reduce log noise from external scans
      SecRuleRemoveById 930130
      SecRuleRemoveById 933150
      # Change default denial to be a 406 so that we can tell easily that it is modsecurity doing the blocking
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    HMPPS_AUTH_BASE_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk"
    HMPPS_HANDOVER_BASE_URL: "https://arns-handover-service-dev.hmpps.service.justice.gov.uk"
    OASYS_BASE_URL: "https://arns-oastub-dev.hmpps.service.justice.gov.uk"
    OASYS_RETURN_URLS: "https://arns-oastub-dev.hmpps.service.justice.gov.uk,https://arns-assessment-platform-dev.hmpps.service.justice.gov.uk,https://t2.oasys.service.justice.gov.uk"
    COORDINATOR_API_BASE_URL: "https://arns-coordinator-api-dev.hmpps.service.justice.gov.uk"
    CLIENT_SP_OAUTH_REDIRECT_URI: "https://arns-assessment-platform-dev.hmpps.service.justice.gov.uk/sign-in/handover/callback,https://*.arns-assessment-platform-dev.hmpps.service.justice.gov.uk/sign-in/handover/callback"
    CLIENT_SP_HANDOVER_REDIRECT_URI: "https://arns-assessment-platform-dev.hmpps.service.justice.gov.uk/sign-in/handover?service=sentence-plan"
    CLIENT_SAN_OAUTH_REDIRECT_URI: "https://strengths-based-needs-assessments-dev.hmpps.service.justice.gov.uk/sign-in/callback,https://*.strengths-based-needs-assessments-dev.hmpps.service.justice.gov.uk/sign-in/callback"
    CLIENT_SAN_HANDOVER_REDIRECT_URI: "https://strengths-based-needs-assessments-dev.hmpps.service.justice.gov.uk/sign-in"

  allowlist:
    mp-nat-egress-one: 13.43.9.198/32
    mp-nat-egress-two: 13.42.163.245/32
    mp-nat-egress-three: 18.132.208.127/32    
    capita-dev: 51.104.16.30/31
    capita-further: 172.167.141.40/32
    capita-developers-vms-one: 85.115.52.180/32
    capita-developers-vms-two: 85.115.52.200/29
    capita-developers-vms-three: 85.115.53.180/32
    capita-developers-vms-four: 85.115.53.200/29
    capita-developers-vms-five: 85.115.54.180/32
    capita-developers-vms-six: 85.115.54.200/29

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: NON_PROD_ALERTS_SEVERITY_LABEL
